<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carrinho</title>

<style>

    .item img{
  width:110px;
  height:110px;
  border-radius:18px;
  object-fit:cover;
}

.info{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.nome{
  font-size:22px;
  font-weight:bold;
}

.descricao{
  color:#bdbdbd;
  margin-top:10px;
  line-height:1.5;
  font-size:15px;
}

.preco{
  color:#00e676;
  font-size:22px;
  margin-top:8px;
  font-weight:bold;
}

.remover{
  border:none;
  background:#b71c1c;
  color:white;
  padding:12px 14px;
  border-radius:12px;
  font-size:14px;
  cursor:pointer;
  margin-top:14px;
  transition:0.2s ease;
}

.remover:hover{
  background:#d32f2f;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:#0f0f0f;

  color:white;

  font-family:Arial,sans-serif;

  padding:18px;

  padding-bottom:130px;

}

/* TOPO */

.topo{

  display:flex;

  align-items:center;

  gap:14px;

  margin-bottom:25px;

}

h1{

  font-size:34px;

  font-weight:bold;

}

/* BOTÃO VOLTAR */

.voltar{

  border:none;

  background:#1f1f1f;

  color:white;

  padding:12px 16px;

  border-radius:14px;

  cursor:pointer;

  font-size:15px;

  font-weight:bold;

  transition:0.2s ease;

}

.voltar:hover{

  background:#2a2a2a;

}

/* FORMULÁRIO */

.formulario{

  display:flex;

  flex-direction:column;

  gap:14px;

  margin-bottom:28px;

}

.formulario input,
.formulario select{

  width:100%;

  border:none;

  background:#1b1b1b;

  color:white;

  padding:18px;

  border-radius:18px;

  font-size:16px;

  outline:none;

  transition:0.2s ease;

}

.formulario input:focus,
.formulario select:focus{

  background:#252525;

  box-shadow:
  0 0 0 2px #00c853;

}

/* LISTA */

#carrinho{

  display:flex;

  flex-direction:column;

  gap:20px;

}

/* ITEM */

.item{

  background:#1b1b1b;

  border-radius:24px;

  overflow:hidden;

  display:flex;

  gap:18px;

  padding:16px;

  box-shadow:
  0 8px 20px rgba(0,0,0,0.3);

}

/* IMAGEM */

.item img{

  width:110px;

  height:110px;

  border-radius:18px;

  object-fit:cover;

}

/* INFO */

.info{

  flex:1;

  display:flex;

  flex-direction:column;

  justify-content:space-between;

}

/* NOME */

.nome{

  font-size:22px;

  font-weight:bold;

}

/* PREÇO */

.preco{

  color:#00e676;

  font-size:22px;

  margin-top:8px;

  font-weight:bold;

}

/* REMOVER */

.remover{

  border:none;

  background:#b71c1c;

  color:white;

  padding:12px 14px;

  border-radius:12px;

  font-size:14px;

  cursor:pointer;

  margin-top:14px;

  transition:0.2s ease;

}

.remover:hover{

  background:#d32f2f;

}

/* TOTAL FIXO */

.total{

  position:fixed;

  bottom:0;

  left:0;

  width:100%;

  background:#151515;

  padding:18px;

  display:flex;

  justify-content:space-between;

  align-items:center;

  box-shadow:
  0 -5px 20px rgba(0,0,0,0.4);

  z-index:999;

}

/* TEXTO TOTAL */

#valorTotal{

  font-size:24px;

  font-weight:bold;

  color:#00e676;

}

/* BOTÃO FINALIZAR */

.finalizar{

  border:none;

  background:#00c853;

  color:white;

  padding:16px 22px;

  border-radius:16px;

  font-size:16px;

  font-weight:bold;

  cursor:pointer;

  transition:0.2s ease;

}

.finalizar:hover{

  background:#00e676;

  transform:scale(1.03);

}

/* VAZIO */

.vazio{

  text-align:center;

  color:#888;

  padding:50px;

  font-size:22px;

}

/* RESPONSIVO */

@media(max-width:700px){

  body{

    padding:14px;

    padding-bottom:140px;

  }

  h1{

    font-size:28px;

  }

  .item{

    flex-direction:column;

  }

  .item img{

    width:100%;

    height:220px;

  }

  .total{

    flex-direction:column;

    gap:14px;

    align-items:stretch;

  }

  .finalizar{

    width:100%;

  }

}

</style>

</head>

<body>

<!-- TOPO -->

<div class="topo">

  <button
    class="voltar"
    onclick="voltar()"
  >

    ← Continuar comprando

  </button>

  <h1>
    🛒 Carrinho
  </h1>

</div>

<!-- FORMULÁRIO -->

<div class="formulario">

  <input
    type="text"
    id="nomeCliente"
    placeholder="Seu nome"
  >

  <input
    type="text"
    id="telefoneCliente"
    placeholder="Telefone"
  >

  <input
    type="text"
    id="enderecoCliente"
    placeholder="Endereço"
  >

  <input
    type="text"
    id="referenciaCliente"
    placeholder="Referência"
  >

  <select id="pagamentoCliente">

    <option value="">
      Forma de pagamento
    </option>

    <option>
      Pix
    </option>

    <option>
      Dinheiro
    </option>

    <option>
      Cartão
    </option>

  </select>

</div>

<!-- ITENS -->

<div id="carrinho"></div>

<!-- TOTAL -->

<div class="total">

  <div id="valorTotal">
    Total: R$ 0
  </div>

  <button
    class="finalizar"
    onclick="finalizarPedido()"
  >

    Finalizar Pedido

  </button>

</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbxXlzzvn6BmEN_Fnpk73xnofoxXchYyi7u2DS7gQurUoT9EdncBN4zK8sBAe2fuifBaow/exec";

let carrinho =
JSON.parse(localStorage.getItem("carrinho")) || [];

/* CARREGAR */

function carregarCarrinho(){

  const div =
  document.getElementById("carrinho");

  if(carrinho.length === 0){

    div.innerHTML =

    `
      <div class="vazio">
        Seu carrinho está vazio
      </div>
    `;

    return;

  }

  let html = "";

  let total = 0;

  carrinho.forEach((item,index) => {

    total += Number(item.preco);

    html += `

<div class="item">

  <img src="${item.imagem}">

  <div class="info">

    <div>

      <div class="nome">
        ${item.nome}
      </div>

      <div class="descricao">
        ${item.descricao}
      </div>

      <div class="preco">
        R$ ${item.preco}
      </div>

    </div>

    <button
      class="remover"
      onclick="removerItem(${index})"
    >

      Remover

    </button>

  </div>

</div>

`;

  });

  div.innerHTML = html;

  document.getElementById("valorTotal")
  .innerHTML =

  `
    Total: R$ ${total.toFixed(2)}
  `;

}

/* REMOVER */

function removerItem(index){

  carrinho.splice(index,1);

  localStorage.setItem(

    "carrinho",

    JSON.stringify(carrinho)

  );

  carregarCarrinho();

}

/* FINALIZAR */

async function finalizarPedido(){

  if(carrinho.length === 0){

    alert("Carrinho vazio");

    return;

  }

  const nome =
  document.getElementById("nomeCliente").value;

  const telefoneCliente =
  document.getElementById("telefoneCliente").value;

  const endereco =
  document.getElementById("enderecoCliente").value;

  const referencia =
  document.getElementById("referenciaCliente").value;

  const pagamento =
  document.getElementById("pagamentoCliente").value;

  if(!nome || !telefoneCliente || !endereco){

    alert(
      "Preencha nome, telefone e endereço"
    );

    return;

  }

  let mensagem =
  "🍔 *Novo Pedido*%0A%0A";

  let nomes = "";

  let total = 0;

  carrinho.forEach(item => {

    mensagem +=
    `• ${item.nome} - R$ ${item.preco}%0A`;

    nomes += item.nome + ", ";

    total += Number(item.preco);

  });

  mensagem +=

  `%0A👤 *Cliente:* ${nome}` +

  `%0A📞 *Telefone:* ${telefoneCliente}` +

  `%0A📍 *Endereço:* ${endereco}` +

  `%0A🏠 *Referência:* ${referencia}` +

  `%0A💳 *Pagamento:* ${pagamento}` +

  `%0A%0A💰 *Total:* R$ ${total.toFixed(2)}`;

  const pedido = {

    cliente:nome,

    telefone:telefoneCliente,

    endereco:endereco,

    referencia:referencia,

    pagamento:pagamento,

    itens:nomes,

    total:total

  };

  /* SALVAR */

  try{

    await fetch(

      API,

      {

        method:"POST",

        body:JSON.stringify(pedido)

      }

    );

  }catch(erro){

    console.log(erro);

  }

  /* WHATSAPP */

  const telefoneRestaurante =
  "5521976556065";

  window.open(

    `https://wa.me/${telefoneRestaurante}?text=${mensagem}`,

    "_blank"

  );

  localStorage.removeItem("carrinho");

  location.reload();

}

/* VOLTAR */

function voltar(){

  window.location.href =
  "index.html";

}

carregarCarrinho();

</script>

</body>

</html>
