<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carrinho</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:#111;
  color:white;
  font-family:Arial;
  padding:20px;
  padding-bottom:120px;

}

h1{

  margin-bottom:25px;
  font-size:32px;

}

#carrinho{

  display:flex;
  flex-direction:column;
  gap:18px;

}

.item{

  background:#1e1e1e;

  border-radius:18px;

  padding:16px;

  display:flex;

  gap:15px;

  align-items:center;

}

.item img{

  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:12px;

}

.nome{

  font-size:22px;
  font-weight:bold;

}

.preco{

  color:#00e676;
  margin-top:8px;
  font-size:20px;

}

.total{

  position:fixed;

  bottom:0;

  left:0;

  width:100%;

  background:#1e1e1e;

  padding:20px;

  display:flex;

  justify-content:space-between;

  align-items:center;

  box-shadow:0 -4px 20px rgba(0,0,0,0.5);

}

button{

  border:none;

  background:#00c853;

  color:white;

  padding:16px 22px;

  border-radius:14px;

  font-size:16px;

  font-weight:bold;

  cursor:pointer;

}

.vazio{

  color:#999;
  font-size:20px;

}

</style>

</head>

<body>

<h1>
🛒 Carrinho
</h1>

<div id="carrinho"></div>

<div class="total">

  <div id="valorTotal">
    Total: R$ 0
  </div>

  <button onclick="finalizarPedido()">
    Finalizar
  </button>

</div>

<script>

let carrinho =
JSON.parse(localStorage.getItem("carrinho")) || [];

function carregarCarrinho(){

  const div =
  document.getElementById("carrinho");

  if(carrinho.length === 0){

    div.innerHTML =
    `<div class="vazio">
      Seu carrinho está vazio
    </div>`;

    return;

  }

  let html = "";

  let total = 0;

  carrinho.forEach((item,index) => {

    total += Number(item.preco);

    html += `

      <div class="item">

        <img src="${item.imagem}">

        <div>

          <div class="nome">
            ${item.nome}
          </div>

          <div class="preco">
            R$ ${item.preco}
          </div>

          <button onclick="removerItem(${index})">
            Remover
          </button>

        </div>

      </div>

    `;

  });

  div.innerHTML = html;

  document.getElementById("valorTotal")
  .innerHTML =

  `
    Total: R$ ${total.toFixed(2)}
  `;

}

function removerItem(index){

  carrinho.splice(index,1);

  localStorage.setItem(
    "carrinho",
    JSON.stringify(carrinho)
  );

  carregarCarrinho();

}

async function finalizarPedido(){

  if(carrinho.length === 0){

    alert("Carrinho vazio");

    return;

  }

  let nomes = "";

  let total = 0;

  carrinho.forEach(item => {

    nomes += item.nome + ", ";

    total += Number(item.preco);

  });

  const pedido = {

    cliente:"Cliente Site",

    itens:nomes,

    total:total

  };

  const resposta =
  await fetch(

    "https://script.google.com/macros/s/AKfycby-XrChkPbtzSZVtu2ovTZmNxQo6aRi991qvW-t2Vcy6097sYCFOmn-7U5q0WJ_dDtqDg/exec",

    {

      method:"POST",

      body:JSON.stringify(pedido)

    }

  );

  const resultado =
  await resposta.json();

  alert(

    "Pedido enviado #" +
    resultado.pedido

  );

  localStorage.removeItem("carrinho");

  location.reload();

}

carregarCarrinho();

function voltar(){

  window.location.href =
  "index.html";

}

</script>

</body>

<button class="voltar" onclick="voltar()">
  ← Continuar comprando
</button>

</html>
