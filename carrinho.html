<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carrinho</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:#111;
  color:white;
  font-family:Arial;
  padding:20px;
  padding-bottom:120px;

}

h1{

  margin-bottom:25px;
  font-size:32px;

}

#carrinho{

  display:flex;
  flex-direction:column;
  gap:18px;

}

.item{

  background:#1e1e1e;

  border-radius:18px;

  padding:16px;

  display:flex;

  gap:15px;

  align-items:center;

}

.item img{

  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:12px;

}

.nome{

  font-size:22px;
  font-weight:bold;

}

.preco{

  color:#00e676;
  margin-top:8px;
  font-size:20px;

}

.total{

  position:fixed;

  bottom:0;

  left:0;

  width:100%;

  background:#1e1e1e;

  padding:20px;

  display:flex;

  justify-content:space-between;

  align-items:center;

  box-shadow:0 -4px 20px rgba(0,0,0,0.5);

}

button{

  border:none;

  background:#00c853;

  color:white;

  padding:16px 22px;

  border-radius:14px;

  font-size:16px;

  font-weight:bold;

  cursor:pointer;

}

.vazio{

  color:#999;
  font-size:20px;

}

</style>

</head>

<body>

<h1>
🛒 Carrinho
</h1>

<div class="formulario">

  <input
    type="text"
    id="nomeCliente"
    placeholder="Seu nome"
  >

  <input
    type="text"
    id="telefoneCliente"
    placeholder="Telefone"
  >

  <input
    type="text"
    id="enderecoCliente"
    placeholder="Endereço"
  >

  <input
    type="text"
    id="referenciaCliente"
    placeholder="Referência"
  >

  <select id="pagamentoCliente">

    <option value="">
      Forma de pagamento
    </option>

    <option>
      Dinheiro
    </option>

    <option>
      Pix
    </option>

    <option>
      Cartão
    </option>

  </select>

</div>

<div id="carrinho"></div>

<div class="total">

  <div id="valorTotal">
    Total: R$ 0
  </div>

  <button onclick="finalizarPedido()">
    Finalizar
  </button>

</div>

<script>

let carrinho =
JSON.parse(localStorage.getItem("carrinho")) || [];

function carregarCarrinho(){

  const div =
  document.getElementById("carrinho");

  if(carrinho.length === 0){

    div.innerHTML =
    `<div class="vazio">
      Seu carrinho está vazio
    </div>`;

    return;

  }

  let html = "";

  let total = 0;

  carrinho.forEach((item,index) => {

    total += Number(item.preco);

    html += `

      <div class="item">

        <img src="${item.imagem}">

        <div>

          <div class="nome">
            ${item.nome}
          </div>

          <div class="preco">
            R$ ${item.preco}
          </div>

          <button onclick="removerItem(${index})">
            Remover
          </button>

        </div>

      </div>

    `;

  });

  div.innerHTML = html;

  document.getElementById("valorTotal")
  .innerHTML =

  `
    Total: R$ ${total.toFixed(2)}
  `;

}

function removerItem(index){

  carrinho.splice(index,1);

  localStorage.setItem(
    "carrinho",
    JSON.stringify(carrinho)
  );

  carregarCarrinho();

}

async function finalizarPedido(){

  if(carrinho.length === 0){

    alert("Carrinho vazio");

    return;

  }

  const nome =
  document.getElementById("nomeCliente").value;

  const telefoneCliente =
  document.getElementById("telefoneCliente").value;

  const endereco =
  document.getElementById("enderecoCliente").value;

  const referencia =
  document.getElementById("referenciaCliente").value;

  const pagamento =
  document.getElementById("pagamentoCliente").value;

  if(!nome || !telefoneCliente || !endereco){

    alert(
      "Preencha nome, telefone e endereço"
    );

    return;

  }

  let mensagem =
  "🍔 *Novo Pedido*%0A%0A";

  let nomes = "";

  let total = 0;

  carrinho.forEach(item => {

    mensagem +=
    `• ${item.nome} - R$ ${item.preco}%0A`;

    nomes += item.nome + ", ";

    total += Number(item.preco);

  });

  mensagem +=

  `%0A👤 *Cliente:* ${nome}` +

  `%0A📞 *Telefone:* ${telefoneCliente}` +

  `%0A📍 *Endereço:* ${endereco}` +

  `%0A🏠 *Referência:* ${referencia}` +

  `%0A💳 *Pagamento:* ${pagamento}` +

  `%0A%0A💰 *Total:* R$ ${total.toFixed(2)}`;

  /* OBJETO PEDIDO */

  const pedido = {

    cliente:nome,

    telefone:telefoneCliente,

    endereco:endereco,

    referencia:referencia,

    pagamento:pagamento,

    itens:nomes,

    total:total

  };

  /* SALVAR */

  try{

    await fetch(

      "https://script.google.com/macros/s/AKfycbxXlzzvn6BmEN_Fnpk73xnofoxXchYyi7u2DS7gQurUoT9EdncBN4zK8sBAe2fuifBaow/exec",

      {

        method:"POST",

        body:JSON.stringify(pedido)

      }

    );

  }catch(erro){

    console.log(erro);

  }

  /* WHATSAPP */

  const telefoneRestaurante =
  "5511999999999";

  window.open(

    `https://wa.me/${telefoneRestaurante}?text=${mensagem}`,

    "_blank"

  );

  localStorage.removeItem("carrinho");

  carregarCarrinho();

}

carregarCarrinho();

function voltar(){

  window.location.href =
  "index.html";

}

</script>

</body>

<button class="voltar" onclick="voltar()">
  ← Continuar comprando
</button>

</html>
