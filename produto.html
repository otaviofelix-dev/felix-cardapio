<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Produto</title>

<style>
.voltar{

  border:none;

  background:#2b2b2b;

  color:white;

  padding:14px 18px;

  border-radius:14px;

  margin:20px;

  font-size:15px;

  cursor:pointer;

}
body{

  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
  padding-bottom:100px;

}

img{

  width:100%;
  height:300px;
  object-fit:cover;

}

.container{

  padding:20px;

}

.nome{

  font-size:32px;
  font-weight:bold;

}

.descricao{

  margin-top:15px;
  color:#ccc;
  line-height:1.5;

}

.preco{

  margin-top:20px;
  color:#00e676;
  font-size:30px;
  font-weight:bold;

}

.botao{

  margin-top:25px;

  width:100%;

  border:none;

  padding:18px;

  border-radius:14px;

  background:#00c853;

  color:white;

  font-size:18px;

  font-weight:bold;

}

.barra{

  position:fixed;

  bottom:0;

  left:0;

  width:100%;

  background:#1e1e1e;

  padding:16px;

  display:flex;

  justify-content:space-between;

  align-items:center;

  box-shadow:0 -4px 20px rgba(0,0,0,0.5);

}

</style>

</head>

<body>

<div id="produto"></div>

<div class="barra">

  <div id="infoCarrinho">
    0 itens
  </div>

  <button onclick="abrirCarrinho()">
    Carrinho
  </button>

</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbwt3KrUacwYqOO31PcW36YjBPa_kC7JGlwnuNdeUvcimbbbyJHHlm-tNoqXsNbm2c2Qng/exec";

const params =
new URLSearchParams(window.location.search);

const id =
params.get("id");

async function carregarProduto(){

  const resposta =
  await fetch(API);

  const produtos =
  await resposta.json();

  const produto =
  produtos.find(p => p.id == id);

  document.getElementById("produto").innerHTML = `

    <img src="${produto.imagem}">

    <div class="container">

      <div class="nome">
        ${produto.nome}
      </div>

      <div class="descricao">
        ${produto.descricao}
      </div>

      <div class="preco">
        R$ ${produto.preco}
      </div>

      <button
        class="botao"
        onclick='adicionarCarrinho(${JSON.stringify(produto)})'
      >

        Adicionar ao Carrinho

      </button>

    </div>

  `;

}

function adicionarCarrinho(produto){

  let carrinho =
  JSON.parse(localStorage.getItem("carrinho")) || [];

  carrinho.push(produto);

  localStorage.setItem(
    "carrinho",
    JSON.stringify(carrinho)
  );

  atualizarBarra();

}

function atualizarBarra(){

  let carrinho =
  JSON.parse(localStorage.getItem("carrinho")) || [];

  let total = 0;

  carrinho.forEach(item => {

    total += Number(item.preco);

  });

  document.getElementById("infoCarrinho").innerHTML =

  `
    ${carrinho.length} itens
    •
    R$ ${total.toFixed(2)}
  `;

}

function abrirCarrinho(){

  window.location.href =
  "carrinho.html";

}

carregarProduto();

atualizarBarra();

function voltar(){

  window.location.href =
  "index.html";

}

</script>

</body>
<button class="voltar" onclick="voltar()">
  ← Continuar comprando
</button>
</html>
