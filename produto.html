<script>

const params =
new URLSearchParams(window.location.search);

const id =
params.get("id");

/* PEGAR PRODUTOS DO CACHE */

let produtos =
JSON.parse(localStorage.getItem("produtos")) || [];

/* ENCONTRAR PRODUTO */

const produto =
produtos.find(p => p.id == id);

/* CARREGAR PRODUTO */

function carregarProduto(){

  if(!produto){

    document.getElementById("produto").innerHTML =
    "Produto não encontrado";

    return;

  }

  document.getElementById("produto").innerHTML =

  `

    <img
      src="${produto.imagem}"
      loading="lazy"
    >

    <div class="container">

      <div class="nome">
        ${produto.nome}
      </div>

      <div class="descricao">
        ${produto.descricao}
      </div>

      <div class="preco">
        R$ ${produto.preco}
      </div>

      <button
        class="botao"
        onclick='adicionarCarrinho(${JSON.stringify(produto)})'
      >

        Adicionar ao Carrinho

      </button>

    </div>

  `;

}

/* ADICIONAR AO CARRINHO */

function adicionarCarrinho(produto){

  let carrinho =
  JSON.parse(localStorage.getItem("carrinho")) || [];

  carrinho.push(produto);

  localStorage.setItem(
    "carrinho",
    JSON.stringify(carrinho)
  );

  atualizarBarra();

}

/* BARRA */

function atualizarBarra(){

  let carrinho =
  JSON.parse(localStorage.getItem("carrinho")) || [];

  let total = 0;

  carrinho.forEach(item => {

    total += Number(item.preco);

  });

  document.getElementById("infoCarrinho").innerHTML =

  `
    ${carrinho.length} itens
    •
    R$ ${total.toFixed(2)}
  `;

}

/* ABRIR CARRINHO */

function abrirCarrinho(){

  window.location.href =
  "carrinho.html";

}

/* VOLTAR */

function voltar(){

  window.location.href =
  "index.html";

}

carregarProduto();

atualizarBarra();

</script>
