<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Félix Cardápio</title>

<style>



*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0f0f0f;
  color:white;
  font-family:Arial,sans-serif;
  padding:18px;
}


/* HERO */

.hero{
  width:100%;
  height:380px;
  border-radius:28px;
  overflow:hidden;
  position:relative;
  margin-bottom:35px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.slides{
  width:100%;
  height:100%;
  position:relative;
}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  inset:0;
  opacity:0;
  transition:1s ease;
}

.slide.ativa{
  opacity:1;
  z-index:1;
}

.slide img{
  width:100%;
  height:100%;
  object-fit:cover;
  animation:zoomHero 8s linear infinite;
}

@keyframes zoomHero{

  0%{
    transform:scale(1);
  }

  100%{
    transform:scale(1.08);
  }

}
.overlay{
  position:absolute;
  inset:0;
  background:
  linear-gradient(
    to right,
    rgba(0,0,0,0.8),
    rgba(0,0,0,0.25)
  );
}

.textoHero{
  position:absolute;
  top:50%;
  left:50px;
  transform:translateY(-50%);
  z-index:2;
  max-width:500px;
}

.tag{
  display:inline-block;
  background:#00c853;
  color:white;
  padding:8px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:bold;
  margin-bottom:16px;
}

.textoHero h2{
  font-size:52px;
  margin-bottom:12px;
}

.textoHero p{
  color:#ddd;
  line-height:1.6;
  margin-bottom:22px;
  font-size:18px;
}

.textoHero button{
  padding:16px 28px;
  font-size:16px;
  border-radius:16px;
}

.bolinhasHero{
  position:absolute;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:10;
}

.dot{
  width:12px;
  height:12px;
  border-radius:50%;
  background:#777;
  transition:0.3s;
}

.dot.ativa{
  background:#00e676;
  transform:scale(1.2);
}

/* TITULO CATEGORIA */

.tituloSecao{
  font-size:28px;
  margin-bottom:22px;
  font-weight:bold;
}

/* CARD MELHORADO */

.card{
  background:linear-gradient(
    180deg,
    #1d1d1d,
    #171717
  );
  border:1px solid rgba(255,255,255,0.04);
}

.card:hover{
  transform:
  translateY(-7px)
  scale(1.01);
}

.imagem{
  position:relative;
}

.badgePromo{
  position:absolute;
  top:14px;
  left:14px;
  background:#ff1744;
  color:white;
  padding:8px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
  z-index:2;
}

/* BARRA SUPERIOR */

.topo{
  margin-bottom:20px;
}

.subtitulo{
  color:#aaa;
  margin-top:6px;
}

.subtitulo{
  color:#aaa;
  margin-top:6px;
}

.logoTitulo{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo{
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:18px;
  box-shadow:0 4px 15px rgba(0,0,0,0.4);
  border:2px solid rgba(255,255,255,0.08);
}


/* RESPONSIVO */

@media(max-width:700px){

  .hero{
    height:300px;
  }

  .textoHero{
    left:24px;
    right:24px;
  }

  .textoHero h2{
    font-size:34px;
  }

  .textoHero p{
    font-size:15px;
  }

}

/* TOPO */

.topo{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

h1{
  font-size:34px;
  font-weight:bold;
  letter-spacing:1px;
}

/* CARRINHO FIXO */

.carrinhoIcon{
  position:fixed;
  top:18px;
  right:18px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:#00c853;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  z-index:999;
  box-shadow:0 6px 18px rgba(0,0,0,0.4);
  transition:0.2s ease;
}

.carrinhoIcon:hover{
  transform:scale(1.05);
}

.carrinhoIcon img{
  width:26px;
  height:26px;
}

.bolinha{
  position:absolute;
  top:-3px;
  right:-3px;
  width:22px;
  height:22px;
  border-radius:50%;
  background:red;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:12px;
  font-weight:bold;
  box-shadow:0 2px 5px rgba(0,0,0,0.5);
}

/* PRODUTOS */

#produtos{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:24px;
}

/* CARD */

.card{
  background:#1d1d1d;
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 8px 24px rgba(0,0,0,0.35);
  transition:0.25s ease;
  display:flex;
  flex-direction:column;
}

.card:hover{
  transform:translateY(-5px);
}

/* IMAGEM */

.imagem{
  width:100%;
  height:240px;
  background:#222;
  overflow:hidden;
}

.imagem img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  transition:0.35s ease;
}

.card:hover .imagem img{
  transform:scale(1.05);
}

/* CONTEÚDO */

.conteudo{
  padding:18px;
  display:flex;
  flex-direction:column;
  flex:1;
}

.nome{
  font-size:24px;
  font-weight:bold;
}

.categoria{
  color:#9e9e9e;
  margin-top:8px;
  font-size:14px;
}

.descricao{
  color:#d0d0d0;
  margin-top:14px;
  line-height:1.5;
  font-size:16px;
  flex:1;
}

.rodape{
  margin-top:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}

.preco{
  color:#00e676;
  font-size:24px;
  font-weight:bold;
}

button{
  border:none;
  background:#00c853;
  color:white;
  padding:14px 18px;
  border-radius:14px;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s ease;
}

button:hover{
  background:#00e676;
  transform:scale(1.03);
}

/* LOADING */

.loading{
  width:100%;
  text-align:center;
  padding:50px;
  color:#999;
  font-size:18px;
}

/* RESPONSIVO */

@media(max-width:700px){

  body{
    padding:14px;
  }

  h1{
    font-size:28px;
  }

  #produtos{
    grid-template-columns:1fr;
  }

  .imagem{
    height:220px;
  }

  .rodape{
    flex-direction:column;
    align-items:stretch;
  }

  button{
    width:100%;
  }

}

</style>

</head>

<body>

<div class="topo">

  <!-- HERO / CARROSSEL -->



  <div>

    <h1 class="logoTitulo">

  <img
    src="https://static.wikia.nocookie.net/6fbc4c9b-8b4c-47a6-984f-2006c8e8a3a5/scale-to-width/755"
    class="logo"
  >

  Félix Cardápio

</h1>

    <div class="subtitulo">
      Os melhores lanches da cidade
    </div>

  </div>

</div>

<!-- CARRINHO -->

<div
  class="carrinhoIcon"
  onclick="abrirCarrinho()"
>

  <img src="https://cdn-icons-png.flaticon.com/512/263/263142.png">

  <div
    class="bolinha"
    id="contador"
  >
    0
  </div>

</div>

<div class="hero">

  <div
    class="slides"
    id="slides"
  >

  </div>

  <div
    class="bolinhasHero"
    id="dots"
  >

  </div>

</div>

<h2 class="tituloSecao">
  🍟 Nosso Cardápio
</h2>

<!-- PRODUTOS -->

<div id="produtos">

  <div class="loading">

    Carregando produtos...

  </div>

</div>

<script>

/* API */

const API =
"https://script.google.com/macros/s/AKfycbwG_i5jLhB7EpRQUlq6fElXCgdJ7WINzsF_cuKyzcGY_cA-ziUYR02VeYfSXa7DJnoQ9w/exec";

/* ABRIR CARRINHO */

function abrirCarrinho(){

  window.location.href =
  "carrinho.html";

}

/* CONTADOR */

function atualizarContador(){

  let carrinho =
  JSON.parse(
    localStorage.getItem("carrinho")
  ) || [];

  document.getElementById("contador")
  .innerText =
  carrinho.length;

}

/* ABRIR PRODUTO */

function abrirProduto(id){

  window.location.href =
  `produto.html?id=${id}`;

}

/* CARREGAR PRODUTOS */

async function carregarProdutos(){

  try{

    const cacheProdutos =
    localStorage.getItem("produtos");

    const cacheTempo =
    localStorage.getItem("produtos_tempo");

    const agora =
    Date.now();

    // 5 minutos
    const tempoLimite =
    1000 * 60 * 5;

    let produtos = null;

    // USA CACHE SE FOR RECENTE
    if(
      cacheProdutos &&
      cacheTempo &&
      (agora - Number(cacheTempo) < tempoLimite)
    ){

      produtos =
      JSON.parse(cacheProdutos);

      console.log("Produtos carregados do CACHE");

    }else{

      console.log("Buscando produtos da API");

      const resposta =
      await fetch(API + "?produtos=1");

      produtos =
      await resposta.json();

      // SALVA CACHE NOVO
      localStorage.setItem(
        "produtos",
        JSON.stringify(produtos)
      );

      localStorage.setItem(
        "produtos_tempo",
        agora
      );

    }

    let html = "";
    let heroHTML = "";
    let dotsHTML = "";
    let slideIndex = 0;

    produtos.forEach(p=>{

if(p.promocao == "SIM"){

  heroHTML += `

  <div class="
    slide
    ${slideIndex == 0 ? "ativa" : ""}
  ">

    <img
      src="${p.imagem}"
    >

    <div class="overlay"></div>

    <div class="textoHero">

      <span class="tag">
        PROMOÇÃO
      </span>

      <h2>
        ${p.nome}
      </h2>

      <p>
        ${p.descricao}
      </p>

      <button
        onclick="abrirProduto('${p.id}')"
      >
        Pedir Agora
      </button>

    </div>

  </div>

  `;

  dotsHTML += `

    <div class="
      dot
      ${slideIndex == 0 ? "ativa" : ""}
    "></div>

  `;

  slideIndex++;

}

      html += `

      <div class="card">

        <div class="imagem">

  ${
    p.promocao == "SIM"
    ?
    `<div class="badgePromo">
      PROMOÇÃO
    </div>`
    :
    ""
  }

          <img
            src="${p.imagem}"
            loading="lazy"

            onerror="
            this.onerror=null;
            this.src='https://placehold.co/600x400?text=Food';
            "
          >

        </div>

        <div class="conteudo">

          <div class="nome">
            ${p.nome}
          </div>

          <div class="categoria">
            ${p.categoria}
          </div>

          <div class="descricao">
            ${p.descricao}
          </div>

          <div class="rodape">

            <div class="preco">
              R$ ${p.preco}
            </div>

            <button
              onclick="abrirProduto('${p.id}')"
            >
              Ver Produto
            </button>

          </div>

        </div>

      </div>

      `;

    });

    document.getElementById("produtos")
    .innerHTML = html;

    document.getElementById("slides")
.innerHTML = heroHTML;

document.getElementById("dots")
.innerHTML = dotsHTML;

iniciarCarrossel();

  }catch(e){

    console.log(e);

    document.getElementById("produtos")
    .innerHTML = `
      <div class='loading'>
        Erro ao carregar produtos.
      </div>
    `;
  }
}

/* INICIAR */

carregarProdutos();

atualizarContador();


function iniciarCarrossel(){

  const slides =
  document.querySelectorAll(".slide");

  const dots =
  document.querySelectorAll(".dot");

  if(slides.length == 0)
  return;

  let slideAtual = 0;

  function mostrarSlide(index){

    slides.forEach(s=>
      s.classList.remove("ativa")
    );

    dots.forEach(d=>
      d.classList.remove("ativa")
    );

    slides[index]
    .classList.add("ativa");

    dots[index]
    .classList.add("ativa");

  }

  setInterval(()=>{

    slideAtual++;

    if(slideAtual >= slides.length){

      slideAtual = 0;

    }

    mostrarSlide(slideAtual);

  },5000);

}

</script>

</body>
</html>
