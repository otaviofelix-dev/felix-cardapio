<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Félix Cardápio</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0f0f0f;
  color:white;
  font-family:Arial,sans-serif;
  padding:18px;
}

/* TOPO */

.topo{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.logoTitulo{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo{
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:18px;
}

.subtitulo{
  color:#aaa;
  margin-top:6px;
}

h1{
  font-size:34px;
}

/* HERO */

.hero{
  width:100%;
  height:420px;
  border-radius:28px;
  overflow:hidden;
  position:relative;
  margin-bottom:28px;
}

.slides{
  width:100%;
  height:100%;
  position:relative;
}

.slide{
  position:absolute;
  inset:0;
  opacity:0;
  transition:1s ease;
}

.slide.ativa{
  opacity:1;
}

.slide img{
  width:100%;
  height:100%;
  object-fit:cover;
  animation:zoomHero 8s linear infinite;
}

@keyframes zoomHero{

  from{
    transform:scale(1);
  }

  to{
    transform:scale(1.08);
  }

}

.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(
    to right,
    rgba(0,0,0,0.8),
    rgba(0,0,0,0.25)
  );
}

.textoHero{
  position:absolute;
  top:50%;
  left:50px;
  transform:translateY(-50%);
  z-index:2;
  max-width:500px;
}

.tag{
  display:inline-block;
  background:#00c853;
  padding:8px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:bold;
  margin-bottom:16px;
}

.textoHero h2{
  font-size:52px;
  margin-bottom:12px;
}

.textoHero p{
  color:#ddd;
  line-height:1.6;
  margin-bottom:22px;
  font-size:18px;
}

.bolinhasHero{
  position:absolute;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:10;
}

.dot{
  width:12px;
  height:12px;
  border-radius:50%;
  background:#777;
  transition:0.3s;
}

.dot.ativa{
  background:#00e676;
  transform:scale(1.2);
}

/* CARRINHO */

.carrinhoIcon{
  position:fixed;
  top:18px;
  right:18px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:#00c853;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  z-index:999;
  box-shadow:0 6px 18px rgba(0,0,0,0.4);
}

.carrinhoIcon img{
  width:26px;
}

.bolinha{
  position:absolute;
  top:-3px;
  right:-3px;
  width:22px;
  height:22px;
  border-radius:50%;
  background:red;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:12px;
  font-weight:bold;
}

/* FILTROS */

#filtrosCategorias{
  display:flex;
  gap:8px;

  overflow-x:auto;
  overflow-y:hidden;

  width:100%;

  padding:6px 0 12px 0;

  scrollbar-width:thin;
  scrollbar-color:#00c853 #1a1a1a;
}

#filtrosCategorias::-webkit-scrollbar{
  height:5px;
}

#filtrosCategorias::-webkit-scrollbar-track{
  background:#1a1a1a;
  border-radius:999px;
}

#filtrosCategorias::-webkit-scrollbar-thumb{
  background:#00c853;
  border-radius:999px;
}

/* BOTÕES */

.filtroBtn{
  flex:0 0 auto;

  border:none;

  background:#1d1d1d;

  color:white;

  height:34px;

  padding:0 5px;

  border-radius:999px;

  cursor:pointer;

  font-weight:bold;

  white-space:nowrap;

  font-size:12px;

  display:flex;
  align-items:center;
  justify-content:center;

  transition:0.25s;
}

.filtroBtn.ativo{
  background:#00c853;
}

.filtroBtn:hover{
  background:#2a2a2a;
}

/* TITULO */

.tituloSecao{
  font-size:28px;
  margin-bottom:22px;
}

/* PRODUTOS */

#produtos{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:24px;
}

/* CARD */

.card{
  background:#1d1d1d;
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 8px 24px rgba(0,0,0,0.35);
  transition:0.25s;
  display:flex;
  flex-direction:column;
}

.card:hover{
  transform:translateY(-5px);
}

.imagem{
  width:100%;
  height:240px;
  position:relative;
  overflow:hidden;
}

.imagem img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:0.35s;
}

.card:hover .imagem img{
  transform:scale(1.05);
}

.badgePromo{
  position:absolute;
  top:14px;
  left:14px;
  background:#ff1744;
  padding:8px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
}

.conteudo{
  padding:18px;
  display:flex;
  flex-direction:column;
  flex:1;
}

.nome{
  font-size:24px;
  font-weight:bold;
}

.categoria{
  color:#999;
  margin-top:8px;
  font-size:14px;
}

.descricao{
  color:#d0d0d0;
  margin-top:14px;
  line-height:1.5;
  flex:1;
}

.rodape{
  margin-top:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}

.preco{
  color:#00e676;
  font-size:24px;
  font-weight:bold;
}

button{
  border:none;
  background:#00c853;
  color:white;
  padding:14px 18px;
  border-radius:14px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#00e676;
}

/* LOADING */

#telaLoading{
  position:fixed;
  inset:0;
  z-index:99999;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(15,15,15,0.55);
  backdrop-filter:blur(14px);
  transition:0.4s;
}

#telaLoading.sumir{
  opacity:0;
  pointer-events:none;
}

.spinner{
  width:70px;
  height:70px;
  border-radius:50%;
  border:5px solid rgba(255,255,255,0.08);
  border-top:5px solid #00e676;
  animation:girar 1s linear infinite;
}

@keyframes girar{

  to{
    transform:rotate(360deg);
  }

}

.loading{
  text-align:center;
  padding:50px;
  color:#999;
}

/* RESPONSIVO */

@media(max-width:700px){

  .filtroBtn{
    width:70px;
  }

}

  .hero{
    height:300px;
  }

  .textoHero{
    left:24px;
    right:24px;
  }

  .textoHero h2{
    font-size:34px;
  }

  .textoHero p{
    font-size:15px;
  }

  #produtos{
    grid-template-columns:1fr;
  }

  .rodape{
    flex-direction:column;
    align-items:stretch;
  }

  button{
    width:100%;
  }

</style>

</head>

<body>

<div id="telaLoading">
  <div class="spinner"></div>
</div>

<div class="topo">

  <div>

    <h1 class="logoTitulo">

      <img
        src="https://static.wikia.nocookie.net/6fbc4c9b-8b4c-47a6-984f-2006c8e8a3a5/scale-to-width/755"
        class="logo"
      >

      Félix Cardápio

    </h1>

    <div class="subtitulo">
      Os melhores lanches da cidade
    </div>

  </div>

</div>

<!-- CARRINHO -->

<div
  class="carrinhoIcon"
  onclick="abrirCarrinho()"
>

  <img src="https://cdn-icons-png.flaticon.com/512/263/263142.png">

  <div class="bolinha" id="contador">
    0
  </div>

</div>

<!-- HERO -->

<div class="hero">

  <div class="slides" id="slides"></div>

  <div class="bolinhasHero" id="dots"></div>

</div>

<!-- FILTROS -->

<div id="filtrosCategorias"></div>

<h2 class="tituloSecao">
  🍟 Nosso Cardápio
</h2>

<!-- PRODUTOS -->

<div id="produtos"></div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbxWZ-yKOMDdnIZBJNqCy2Lrg7MVTX0tSsz6ewHxXF58VwnjWLXbN-aQY2XkPxdp7167Ig/exec";

/* ABRIR CARRINHO */

function abrirCarrinho(){

  window.location.href =
  "carrinho.html";

}

/* CONTADOR */

function atualizarContador(){

  let carrinho =
  JSON.parse(
    localStorage.getItem("carrinho")
  ) || [];

  document.getElementById("contador")
  .innerText =
  carrinho.length;

}

/* ABRIR PRODUTO */

function abrirProduto(id){

  window.location.href =
  `produto.html?id=${id}`;

}

/* CARREGAR PRODUTOS */

async function carregarProdutos(){



  try{

    const resposta =
    await fetch(API + "?produtos=1");

    const produtos =
    await resposta.json();

localStorage.setItem("produtos",
JSON.stringify(produtos)
);



    window.todosProdutos =
    produtos;

    gerarHero(produtos);

    gerarFiltros(produtos);

    renderizarProdutos(produtos);

    iniciarCarrossel();

    setTimeout(()=>{

      document
      .getElementById("telaLoading")
      .classList.add("sumir");

    },600);

  }catch(e){

    console.log(e);

    document.getElementById("produtos")
    .innerHTML = `
      <div class="loading">
        Erro ao carregar produtos.
      </div>
    `;

  }

}

/* HERO */

function gerarHero(produtos){

  let promocoes =
  produtos.filter(p =>

    p.promocao &&
    p.promocao.toUpperCase() == "SIM"

  );

  // Se não existir promoção,
  // pega os 3 primeiros produtos

  if(promocoes.length == 0){

    promocoes =
    produtos.slice(0,3);

  }

  let heroHTML = "";
  let dotsHTML = "";

  promocoes.forEach((p,index)=>{

    heroHTML += `

    <div class="slide ${index == 0 ? 'ativa' : ''}">

      <img src="${p.imagem}">

      <div class="overlay"></div>

      <div class="textoHero">

        <div class="tag">
          🔥 PROMOÇÃO
        </div>

        <h2>
          ${p.nome}
        </h2>

        <p>
          ${p.descricao}
        </p>

      </div>

    </div>

    `;

    dotsHTML += `
      <div class="dot ${index == 0 ? 'ativa' : ''}"></div>
    `;

  });

  document.getElementById("slides")
  .innerHTML = heroHTML;

  document.getElementById("dots")
  .innerHTML = dotsHTML;

}

/* FILTROS */

function gerarFiltros(produtos){

  let categorias = [
    ...new Set(
      produtos.map(p => p.categoria)
    )
  ];

  let html = `
    <button
      class="filtroBtn ativo"
      onclick="filtrarCategoria('TODOS', this)"
    >
      Todos
    </button>
  `;

  categorias.forEach(cat=>{

    html += `
      <button
        class="filtroBtn"
        onclick="filtrarCategoria('${cat}', this)"
      >
        ${cat}
      </button>
    `;

  });

  document.getElementById("filtrosCategorias")
  .innerHTML = html;

}

/* RENDERIZAR PRODUTOS */

function renderizarProdutos(produtos){

  let html = "";

  produtos.forEach(p=>{

    html += `

    <div class="card">

      <div class="imagem">

        ${
          p.promocao == "SIM"
          ?
          `<div class="badgePromo">
            PROMOÇÃO
          </div>`
          :
          ""
        }

        <img
          src="${p.imagem}"
          loading="lazy"
        >

      </div>

      <div class="conteudo">

        <div class="nome">
          ${p.nome}
        </div>

        <div class="categoria">
          ${p.categoria}
        </div>

        <div class="descricao">
          ${p.descricao}
        </div>

        <div class="rodape">

          <div class="preco">
            R$ ${p.preco}
          </div>

          <button
            onclick="abrirProduto('${p.id}')"
          >
            Ver Produto
          </button>

        </div>

      </div>

    </div>

    `;

  });

  document.getElementById("produtos")
  .innerHTML = html;

}

/* FILTRAR */

function filtrarCategoria(categoria, botao){

  document
  .querySelectorAll(".filtroBtn")
  .forEach(btn=>{

    btn.classList.remove("ativo");

  });

  botao.classList.add("ativo");

  if(categoria == "TODOS"){

    renderizarProdutos(
      window.todosProdutos
    );

    return;

  }

  const filtrados =
  window.todosProdutos.filter(p=>

    p.categoria == categoria

  );

  renderizarProdutos(filtrados);

}

/* CARROSSEL */

function iniciarCarrossel(){

  const slides =
  document.querySelectorAll(".slide");

  const dots =
  document.querySelectorAll(".dot");

  if(slides.length == 0)
  return;

  let slideAtual = 0;

  setInterval(()=>{

    slides[slideAtual]
    .classList.remove("ativa");

    dots[slideAtual]
    .classList.remove("ativa");

    slideAtual++;

    if(slideAtual >= slides.length){

      slideAtual = 0;

    }

    slides[slideAtual]
    .classList.add("ativa");

    dots[slideAtual]
    .classList.add("ativa");

  },5000);

}

/* INICIAR */

carregarProdutos();

atualizarContador();

</script>

</body>
</html>
